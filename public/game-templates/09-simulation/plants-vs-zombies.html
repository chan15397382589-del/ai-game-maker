<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>植物大战僵尸简化版</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
// ==================== 植物大战僵尸简化版 ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// 游戏常量
const ROWS = 5;
const COLS = 9;
const PLANT_TYPES = {
    sunflower: { name: '向日葵', cost: 50, hp: 100, color: '#FFD700', sunInterval: 5000 },
    peashooter: { name: '豌豆射手', cost: 100, hp: 100, color: '#32CD32', shootInterval: 1500 },
    wallnut: { name: '坚果墙', cost: 50, hp: 400, color: '#8B4513' }
};

// 游戏状态
let gameState = 'menu'; // menu, playing, gameover
let sunCount = 50;
let wave = 0;
let waveTimer = 0;
let plants = []; // {row, col, type, hp, timer}
let zombies = []; // {row, x, hp, speed, eating}
let peas = []; // {row, x, y, speed}
let suns = []; // {x, y, targetY, timer, collected}
let floatingTexts = []; // {x, y, text, color, alpha, vy}
let selectedPlant = null;
let gridOffsetX = 0;
let gridOffsetY = 0;
let cellW = 0;
let cellH = 0;
let mouseX = 0;
let mouseY = 0;

// 计算网格布局
function calcLayout() {
    const barH = 80;
    const topH = 60;
    cellW = Math.floor((canvas.width - 40) / COLS);
    cellH = Math.floor((canvas.height - barH - topH - 20) / ROWS);
    const s = Math.min(cellW, cellH, 80);
    cellW = s;
    cellH = s;
    gridOffsetX = Math.floor((canvas.width - cellW * COLS) / 2);
    gridOffsetY = topH + 10;
}
calcLayout();

// 绘制工具
function drawRoundRect(x, y, w, h, r, fill, stroke) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
}

// 菜单界面
function drawMenu() {
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, '#87CEEB');
    grad.addColorStop(0.6, '#90EE90');
    grad.addColorStop(1, '#228B22');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#2d5a1e';
    ctx.font = 'bold 52px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('植物大战僵尸', canvas.width / 2, canvas.height * 0.25);

    ctx.fillStyle = '#4a7a2e';
    ctx.font = '24px Arial';
    ctx.fillText('简化版', canvas.width / 2, canvas.height * 0.33);

    const btnW = 260, btnH = 70;
    const btnX = canvas.width / 2 - btnW / 2;
    const btnY = canvas.height * 0.5;
    const hover = mouseX >= btnX && mouseX <= btnX + btnW && mouseY >= btnY && mouseY <= btnY + btnH;
    drawRoundRect(btnX, btnY, btnW, btnH, 15, hover ? '#FF6347' : '#DC143C', '#8B0000');
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 30px Arial';
    ctx.fillText('开始游戏', canvas.width / 2, btnY + btnH / 2);

    ctx.fillStyle = '#333';
    ctx.font = '18px Arial';
    ctx.fillText('收集阳光，种植植物，消灭僵尸！', canvas.width / 2, canvas.height * 0.7);
    ctx.fillText('底部选择植物 → 点击草坪放置', canvas.width / 2, canvas.height * 0.75);
    ctx.fillText('点击天空落下的阳光收集能量', canvas.width / 2, canvas.height * 0.8);
}

// 游戏结束界面
function drawGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#FF4444';
    ctx.font = 'bold 60px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('游戏结束！', canvas.width / 2, canvas.height * 0.3);

    ctx.fillStyle = '#fff';
    ctx.font = '30px Arial';
    ctx.fillText('坚持了 ' + wave + ' 波僵尸', canvas.width / 2, canvas.height * 0.45);

    const btnW = 240, btnH = 60;
    const btnX = canvas.width / 2 - btnW / 2;
    const btnY = canvas.height * 0.58;
    const hover = mouseX >= btnX && mouseX <= btnX + btnW && mouseY >= btnY && mouseY <= btnY + btnH;
    drawRoundRect(btnX, btnY, btnW, btnH, 12, hover ? '#FF6347' : '#DC143C', '#8B0000');
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 26px Arial';
    ctx.fillText('再来一局', canvas.width / 2, btnY + btnH / 2);
}

// 绘制草坪
function drawLawn() {
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const x = gridOffsetX + c * cellW;
            const y = gridOffsetY + r * cellH;
            const light = (r + c) % 2 === 0;
            ctx.fillStyle = light ? '#5cb85c' : '#4cae4c';
            ctx.fillRect(x, y, cellW, cellH);
            ctx.strokeStyle = 'rgba(0,0,0,0.1)';
            ctx.strokeRect(x, y, cellW, cellH);
        }
    }
}

// 绘制植物
function drawPlant(plant) {
    const x = gridOffsetX + plant.col * cellW;
    const y = gridOffsetY + plant.row * cellH;
    const cx = x + cellW / 2;
    const cy = y + cellH / 2;
    const size = cellW * 0.35;

    if (plant.type === 'sunflower') {
        ctx.fillStyle = '#FFD700';
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const px = cx + Math.cos(angle) * size * 0.7;
            const py = cy + Math.sin(angle) * size * 0.7;
            ctx.beginPath();
            ctx.ellipse(px, py, size * 0.35, size * 0.2, angle, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.fillStyle = '#8B4513';
        ctx.beginPath(); ctx.arc(cx, cy, size * 0.35, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#228B22'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(cx, cy + size * 0.5); ctx.lineTo(cx, y + cellH - 5); ctx.stroke();
    } else if (plant.type === 'peashooter') {
        ctx.strokeStyle = '#228B22'; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(cx, cy + size * 0.3); ctx.lineTo(cx, y + cellH - 5); ctx.stroke();
        ctx.fillStyle = '#32CD32';
        ctx.beginPath(); ctx.arc(cx, cy - size * 0.1, size * 0.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#228B22';
        ctx.fillRect(cx + size * 0.2, cy - size * 0.2, size * 0.5, size * 0.25);
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(cx + size * 0.1, cy - size * 0.25, size * 0.12, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(cx + size * 0.15, cy - size * 0.25, size * 0.06, 0, Math.PI * 2); ctx.fill();
    } else if (plant.type === 'wallnut') {
        ctx.fillStyle = '#DEB887';
        ctx.beginPath(); ctx.ellipse(cx, cy, size * 0.55, size * 0.65, 0, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#8B4513'; ctx.lineWidth = 2; ctx.stroke();
        ctx.strokeStyle = '#A0522D'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(cx - size * 0.15, cy, size * 0.2, -0.5, 1); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx + size * 0.15, cy, size * 0.2, 2, 3.5); ctx.stroke();
        const hpRatio = plant.hp / PLANT_TYPES[plant.type].hp;
        if (hpRatio < 1) {
            const bw = cellW * 0.6;
            ctx.fillStyle = '#333'; ctx.fillRect(cx - bw / 2, y + 4, bw, 6);
            ctx.fillStyle = hpRatio > 0.5 ? '#0f0' : hpRatio > 0.25 ? '#ff0' : '#f00';
            ctx.fillRect(cx - bw / 2, y + 4, bw * hpRatio, 6);
        }
    }
}

// 绘制僵尸
function drawZombie(z) {
    const x = z.x;
    const cy = gridOffsetY + z.row * cellH + cellH / 2;
    const size = cellH * 0.4;

    ctx.fillStyle = '#556B2F';
    ctx.fillRect(x - size * 0.3, cy - size * 0.3, size * 0.6, size * 1.0);
    ctx.fillStyle = '#8B8682';
    ctx.beginPath(); ctx.arc(x, cy - size * 0.5, size * 0.35, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FF0000';
    ctx.beginPath(); ctx.arc(x - size * 0.1, cy - size * 0.55, size * 0.08, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + size * 0.1, cy - size * 0.55, size * 0.08, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#8B8682'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(x - size * 0.3, cy - size * 0.1); ctx.lineTo(x - size * 0.7, cy - size * 0.4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + size * 0.3, cy - size * 0.1); ctx.lineTo(x + size * 0.7, cy - size * 0.3); ctx.stroke();
    ctx.strokeStyle = '#556B2F'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(x - size * 0.1, cy + size * 0.7); ctx.lineTo(x - size * 0.2, cy + size * 1.2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + size * 0.1, cy + size * 0.7); ctx.lineTo(x + size * 0.2, cy + size * 1.2); ctx.stroke();

    const hpRatio = z.hp / 200;
    const bw = size * 1.2;
    ctx.fillStyle = '#333'; ctx.fillRect(x - bw / 2, cy - size * 1.0, bw, 5);
    ctx.fillStyle = hpRatio > 0.5 ? '#0f0' : hpRatio > 0.25 ? '#ff0' : '#f00';
    ctx.fillRect(x - bw / 2, cy - size * 1.0, bw * hpRatio, 5);
}

// 绘制豌豆子弹
function drawPea(p) {
    ctx.fillStyle = '#32CD32'; ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#90EE90'; ctx.beginPath(); ctx.arc(p.x - 2, p.y - 2, 2, 0, Math.PI * 2); ctx.fill();
}

// 绘制阳光
function drawSun(s) {
    const r = 18;
    ctx.save();
    ctx.globalAlpha = s.alpha || 1;
    const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r * 1.5);
    glow.addColorStop(0, 'rgba(255,255,0,0.4)'); glow.addColorStop(1, 'rgba(255,255,0,0)');
    ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(s.x, s.y, r * 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#FFA500'; ctx.lineWidth = 2; ctx.stroke();
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2;
    for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2 + Date.now() * 0.002;
        ctx.beginPath();
        ctx.moveTo(s.x + Math.cos(a) * (r + 2), s.y + Math.sin(a) * (r + 2));
        ctx.lineTo(s.x + Math.cos(a) * (r + 8), s.y + Math.sin(a) * (r + 8));
        ctx.stroke();
    }
    ctx.restore();
}

// 绘制底部选择栏
function drawPlantBar() {
    const barY = canvas.height - 80;
    ctx.fillStyle = 'rgba(60,30,0,0.85)';
    ctx.fillRect(0, barY, canvas.width, 80);

    const types = ['sunflower', 'peashooter', 'wallnut'];
    const icons = ['\u{1F33B}', '\u{1F33F}', '\u{1F7EB}'];
    const barW = canvas.width / 2;
    const startX = (canvas.width - barW * 0.75) / 2;
    const btnW = barW / 3;

    for (let i = 0; i < 3; i++) {
        const type = types[i];
        const info = PLANT_TYPES[type];
        const bx = startX + i * btnW;
        const by = barY + 8;
        const bw = btnW - 10;
        const bh = 64;
        const canAfford = sunCount >= info.cost;
        const isSelected = selectedPlant === type;
        const hover = mouseX >= bx && mouseX <= bx + bw && mouseY >= by && mouseY <= by + bh;

        let bgColor = isSelected ? '#4CAF50' : (canAfford ? (hover ? '#5a4a3a' : '#3a2a1a') : '#2a1a0a');
        drawRoundRect(bx, by, bw, bh, 8, bgColor, canAfford ? '#8B7355' : '#555');

        if (!canAfford) ctx.globalAlpha = 0.5;
        ctx.font = '28px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = '#fff'; ctx.fillText(icons[i], bx + 28, by + bh / 2);
        ctx.font = 'bold 16px Arial'; ctx.fillStyle = '#fff'; ctx.textAlign = 'left';
        ctx.fillText(info.name, bx + 52, by + 22);
        ctx.fillStyle = '#FFD700'; ctx.font = '14px Arial';
        ctx.fillText('☀ ' + info.cost, bx + 52, by + 45);
        ctx.globalAlpha = 1;
    }
}

// 绘制HUD
function drawHUD() {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    drawRoundRect(10, 8, 140, 45, 10, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = '#FFD700'; ctx.font = '28px Arial'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText('☀ ' + sunCount, 25, 30);

    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    drawRoundRect(canvas.width - 160, 8, 150, 45, 10, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = '#FF6347'; ctx.font = 'bold 22px Arial'; ctx.textAlign = 'right';
    ctx.fillText('第 ' + wave + ' 波', canvas.width - 25, 30);
}

// 绘制漂浮文字
function drawFloatingTexts() {
    for (const ft of floatingTexts) {
        ctx.save(); ctx.globalAlpha = ft.alpha; ctx.fillStyle = ft.color;
        ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(ft.text, ft.x, ft.y); ctx.restore();
    }
}

// 生成阳光（从天空掉落）
function spawnSkySun() {
    const x = gridOffsetX + Math.random() * (cellW * COLS);
    suns.push({
        x: x, y: -20,
        targetY: gridOffsetY + Math.random() * (cellH * ROWS),
        speed: 1 + Math.random(), timer: 8000, type: 'sky'
    });
}

// 生成向日葵阳光
function spawnPlantSun(plant) {
    const x = gridOffsetX + plant.col * cellW + cellW / 2;
    const y = gridOffsetY + plant.row * cellH + cellH / 2;
    suns.push({
        x: x, y: y,
        targetY: y + 20 + Math.random() * 30,
        speed: 0.5, timer: 6000, type: 'plant'
    });
}

// 生成一波僵尸
function spawnWave() {
    wave++;
    const count = 3 + Math.floor(Math.random() * 3);
    for (let i = 0; i < count; i++) {
        const row = Math.floor(Math.random() * ROWS);
        zombies.push({
            row: row,
            x: canvas.width + 20 + Math.random() * 100,
            hp: 200,
            speed: 0.3 + Math.random() * 0.2 + wave * 0.02,
            eating: null, eatTimer: 0
        });
    }
}

// 添加漂浮文字
function addFloatingText(x, y, text, color) {
    floatingTexts.push({ x, y, text, color, alpha: 1, vy: -2 });
}

// 重置游戏
function resetGame() {
    sunCount = 50; wave = 0; waveTimer = 0;
    plants = []; zombies = []; peas = []; suns = [];
    floatingTexts = []; selectedPlant = null;
    gameState = 'playing';
    window.postMessage({ type: 'game_event', eventType: 'game_start', data: { gameType: '植物大战僵尸简化版' } }, '*');
}

// 更新游戏逻辑
function update(dt) {
    if (gameState !== 'playing') return;

    // 阳光掉落
    waveTimer += dt;
    if (waveTimer > 10000 + Math.random() * 3000) { spawnSkySun(); }

    // 波次生成
    if (wave === 0 && waveTimer > 10000) { spawnWave(); }
    else if (wave > 0 && waveTimer > 20000) { waveTimer = 0; spawnWave(); }

    // 更新阳光
    for (let i = suns.length - 1; i >= 0; i--) {
        const s = suns[i];
        if (s.y < s.targetY) { s.y += s.speed; }
        s.timer -= dt;
        if (s.timer <= 0) { suns.splice(i, 1); }
    }

    // 更新植物
    for (const plant of plants) {
        plant.timer = (plant.timer || 0) + dt;
        if (plant.type === 'sunflower' && plant.timer >= PLANT_TYPES.sunflower.sunInterval) {
            plant.timer = 0; spawnPlantSun(plant);
        }
        if (plant.type === 'peashooter') {
            const hasZombieInRow = zombies.some(z => z.row === plant.row && z.x > gridOffsetX + plant.col * cellW);
            if (hasZombieInRow && plant.timer >= PLANT_TYPES.peashooter.shootInterval) {
                plant.timer = 0;
                const px = gridOffsetX + plant.col * cellW + cellW;
                const py = gridOffsetY + plant.row * cellH + cellH / 2;
                peas.push({ row: plant.row, x: px, y: py, speed: 4 });
            }
        }
    }

    // 更新豌豆
    for (let i = peas.length - 1; i >= 0; i--) {
        const p = peas[i]; p.x += p.speed;
        if (p.x > canvas.width + 10) { peas.splice(i, 1); continue; }
        for (let j = zombies.length - 1; j >= 0; j--) {
            const z = zombies[j];
            if (z.row === p.row && Math.abs(z.x - p.x) < 20) {
                z.hp -= 20; peas.splice(i, 1);
                addFloatingText(z.x, gridOffsetY + z.row * cellH, '-20', '#FF4444');
                if (z.hp <= 0) { zombies.splice(j, 1); }
                break;
            }
        }
    }

    // 更新僵尸
    for (let i = zombies.length - 1; i >= 0; i--) {
        const z = zombies[i];
        if (z.eating !== null) {
            const plant = plants.find(p => p.row === z.row && p.col === z.eating);
            if (!plant) { z.eating = null; }
            else {
                z.eatTimer += dt;
                if (z.eatTimer >= 500) {
                    z.eatTimer = 0; plant.hp -= 25;
                    if (plant.hp <= 0) {
                        const idx = plants.indexOf(plant);
                        if (idx >= 0) plants.splice(idx, 1);
                        z.eating = null;
                    }
                }
            }
        } else {
            z.x -= z.speed;
            for (const plant of plants) {
                if (plant.row === z.row) {
                    const plantX = gridOffsetX + plant.col * cellW + cellW;
                    if (Math.abs(z.x - plantX) < 10) { z.eating = plant.col; z.eatTimer = 0; break; }
                }
            }
            if (z.x < gridOffsetX - 10) {
                gameState = 'gameover';
                window.postMessage({ type: 'game_event', eventType: 'game_end', data: { score: wave } }, '*');
                return;
            }
        }
    }

    // 更新漂浮文字
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
        const ft = floatingTexts[i];
        ft.y += ft.vy; ft.alpha -= 0.015;
        if (ft.alpha <= 0) floatingTexts.splice(i, 1);
    }
}

// 主渲染
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (gameState === 'menu') { drawMenu(); return; }

    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, '#87CEEB'); grad.addColorStop(0.3, '#87CEEB');
    grad.addColorStop(0.35, '#90EE90'); grad.addColorStop(1, '#228B22');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawLawn();
    for (const plant of plants) drawPlant(plant);
    for (const z of zombies) drawZombie(z);
    for (const p of peas) drawPea(p);
    for (const s of suns) drawSun(s);
    drawFloatingTexts();
    drawPlantBar();
    drawHUD();

    if (gameState === 'gameover') drawGameOver();
}

// 点击处理
function handleClick(x, y) {
    if (gameState === 'menu') {
        const btnW = 260, btnH = 70;
        const btnX = canvas.width / 2 - btnW / 2;
        const btnY = canvas.height * 0.5;
        if (x >= btnX && x <= btnX + btnW && y >= btnY && y <= btnY + btnH) { resetGame(); }
        return;
    }
    if (gameState === 'gameover') {
        const btnW = 240, btnH = 60;
        const btnX = canvas.width / 2 - btnW / 2;
        const btnY = canvas.height * 0.58;
        if (x >= btnX && x <= btnX + btnW && y >= btnY && y <= btnY + btnH) { resetGame(); }
        return;
    }

    // 点击收集阳光
    for (let i = suns.length - 1; i >= 0; i--) {
        const s = suns[i];
        const dx = x - s.x, dy = y - s.y;
        if (dx * dx + dy * dy < 900) {
            sunCount += 25;
            addFloatingText(s.x, s.y - 20, '+25 ☀', '#FFD700');
            suns.splice(i, 1); return;
        }
    }

    // 点击选择栏
    const barY = canvas.height - 80;
    if (y >= barY) {
        const types = ['sunflower', 'peashooter', 'wallnut'];
        const barW = canvas.width / 2;
        const startX = (canvas.width - barW * 0.75) / 2;
        const btnW = barW / 3;
        for (let i = 0; i < 3; i++) {
            const bx = startX + i * btnW;
            const bw = btnW - 10;
            if (x >= bx && x <= bx + bw && y >= barY + 8 && y <= barY + 72) {
                const type = types[i];
                if (sunCount >= PLANT_TYPES[type].cost) {
                    selectedPlant = selectedPlant === type ? null : type;
                }
                return;
            }
        }
        return;
    }

    // 点击草坪放置植物
    if (selectedPlant) {
        const col = Math.floor((x - gridOffsetX) / cellW);
        const row = Math.floor((y - gridOffsetY) / cellH);
        if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
            const exists = plants.some(p => p.row === row && p.col === col);
            if (!exists && sunCount >= PLANT_TYPES[selectedPlant].cost) {
                sunCount -= PLANT_TYPES[selectedPlant].cost;
                plants.push({
                    row: row, col: col, type: selectedPlant,
                    hp: PLANT_TYPES[selectedPlant].hp, timer: 0
                });
                selectedPlant = null;
            }
        }
    }
}

// 事件监听
canvas.addEventListener('click', e => handleClick(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0]; handleClick(t.clientX, t.clientY);
}, { passive: false });
canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

// 游戏循环
let lastTime = performance.now();
function gameLoop(time) {
    const dt = time - lastTime; lastTime = time;
    calcLayout(); update(dt); draw();
    requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
