<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cookie Clicker 饼干工厂</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
// ==================== Cookie Clicker 饼干工厂 ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// 游戏状态
let gameState = 'menu'; // menu, playing
let cookies = 0;
let totalCookies = 0;
let cps = 0; // cookies per second
let cookieScale = 1;
let cookieScaleTarget = 1;
let mouseX = 0, mouseY = 0;
let lastTime = performance.now();

// 升级系统
const upgrades = [
    { name: '光标', desc: '每10秒自动+1', basePrice: 15, price: 15, count: 0, cps: 0.1, icon: '\u{1F446}' },
    { name: '奶奶', desc: '每秒+1', basePrice: 100, price: 100, count: 0, cps: 1, icon: '\u{1F475}' },
    { name: '农场', desc: '每秒+5', basePrice: 500, price: 500, count: 0, cps: 5, icon: '\u{1F33E}' }
];

// 漂浮文字
let floatingTexts = [];

// 饼干巧克力碎粒位置
const chips = [];
for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 30 + Math.random() * 70;
    chips.push({
        x: Math.cos(angle) * dist,
        y: Math.sin(angle) * dist,
        r: 5 + Math.random() * 8
    });
}

// 计算CPS
function calcCPS() {
    cps = 0;
    for (const u of upgrades) { cps += u.count * u.cps; }
}

// 添加漂浮文字
function addFloatingText(x, y, text, color) {
    floatingTexts.push({ x, y, text, color, alpha: 1.2, vy: -2.5, size: 24 + Math.random() * 8 });
}

// 购买升级
function buyUpgrade(index) {
    const u = upgrades[index];
    if (cookies >= u.price) {
        cookies -= u.price;
        u.count++;
        u.price = Math.floor(u.basePrice * Math.pow(1.15, u.count));
        calcCPS();
    }
}

// 绘制饼干
function drawCookie(cx, cy, radius) {
    const r = radius * cookieScale;

    // 阴影
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 20;
    ctx.shadowOffsetX = 5; ctx.shadowOffsetY = 5;
    ctx.fillStyle = '#D2691E';
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // 边缘纹理
    ctx.strokeStyle = '#A0522D'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(cx, cy, r - 5, 0, Math.PI * 2); ctx.stroke();

    // 巧克力碎粒
    ctx.fillStyle = '#3E2723';
    for (const chip of chips) {
        const scaleX = cookieScale;
        ctx.beginPath();
        ctx.ellipse(cx + chip.x * scaleX, cy + chip.y * scaleX, chip.r * scaleX, chip.r * scaleX * 0.8, chip.x * 0.02, 0, Math.PI * 2);
        ctx.fill();
    }

    // 表面纹理
    ctx.strokeStyle = 'rgba(139,69,19,0.3)'; ctx.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2;
        ctx.beginPath();
        ctx.arc(cx + Math.cos(angle) * r * 0.4, cy + Math.sin(angle) * r * 0.4, r * 0.15, 0, Math.PI * 2);
        ctx.stroke();
    }
}

// 绘制商店面板
function drawShop() {
    const panelW = Math.min(320, canvas.width * 0.3);
    const panelX = canvas.width - panelW;

    ctx.fillStyle = 'rgba(40, 20, 10, 0.85)';
    ctx.fillRect(panelX, 0, panelW, canvas.height);

    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 28px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('\u{1F3EA} 商店', panelX + panelW / 2, 35);

    ctx.fillStyle = '#90EE90'; ctx.font = '18px Arial';
    ctx.fillText('每秒产出: ' + cps.toFixed(1) + ' 饼干', panelX + panelW / 2, 70);

    const itemH = 100, startY = 100;
    for (let i = 0; i < upgrades.length; i++) {
        const u = upgrades[i];
        const iy = startY + i * (itemH + 15);
        const canBuy = cookies >= u.price;
        const hover = mouseX >= panelX + 10 && mouseX <= panelX + panelW - 10 &&
                      mouseY >= iy && mouseY <= iy + itemH;

        const bg = canBuy ? (hover ? 'rgba(100,80,50,0.9)' : 'rgba(70,50,30,0.9)') : 'rgba(40,30,20,0.7)';
        ctx.fillStyle = bg;
        ctx.beginPath(); ctx.roundRect(panelX + 10, iy, panelW - 20, itemH, 10); ctx.fill();
        ctx.strokeStyle = canBuy ? '#8B7355' : '#444'; ctx.lineWidth = 2; ctx.stroke();

        ctx.font = '36px Arial'; ctx.textAlign = 'center'; ctx.fillStyle = canBuy ? '#fff' : '#666';
        ctx.fillText(u.icon, panelX + 45, iy + 35);

        ctx.font = 'bold 18px Arial'; ctx.textAlign = 'left'; ctx.fillStyle = canBuy ? '#fff' : '#888';
        ctx.fillText(u.name, panelX + 75, iy + 25);

        ctx.font = '14px Arial'; ctx.fillStyle = canBuy ? '#ccc' : '#666';
        ctx.fillText(u.desc, panelX + 75, iy + 48);

        ctx.font = 'bold 16px Arial'; ctx.fillStyle = canBuy ? '#FFD700' : '#664400';
        ctx.fillText('\u{1F36A} ' + u.price, panelX + 75, iy + 72);

        ctx.textAlign = 'right'; ctx.font = 'bold 22px Arial';
        ctx.fillStyle = canBuy ? '#90EE90' : '#555';
        ctx.fillText('x' + u.count, panelX + panelW - 25, iy + 50);
        ctx.textAlign = 'left';
    }
}

// 绘制漂浮文字
function drawFloatingTexts() {
    for (const ft of floatingTexts) {
        ctx.save(); ctx.globalAlpha = Math.min(1, ft.alpha);
        ctx.fillStyle = ft.color; ctx.font = 'bold ' + ft.size + 'px Arial';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(ft.text, ft.x, ft.y); ctx.restore();
    }
}

// 菜单界面
function drawMenu() {
    const grad = ctx.createRadialGradient(canvas.width / 2, canvas.height / 2, 0, canvas.width / 2, canvas.height / 2, canvas.width * 0.7);
    grad.addColorStop(0, '#FFF8DC'); grad.addColorStop(0.5, '#FAEBD7'); grad.addColorStop(1, '#D2B48C');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#8B4513'; ctx.font = 'bold 52px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('\u{1F36A} Cookie Clicker', canvas.width / 2, canvas.height * 0.22);

    ctx.fillStyle = '#A0522D'; ctx.font = '24px Arial';
    ctx.fillText('饼干工厂', canvas.width / 2, canvas.height * 0.31);

    drawCookie(canvas.width / 2, canvas.height * 0.48, 50);

    const btnW = 280, btnH = 70;
    const btnX = canvas.width / 2 - btnW / 2, btnY = canvas.height * 0.63;
    const hover = mouseX >= btnX && mouseX <= btnX + btnW && mouseY >= btnY && mouseY <= btnY + btnH;
    ctx.fillStyle = hover ? '#CD853F' : '#D2691E';
    ctx.beginPath(); ctx.roundRect(btnX, btnY, btnW, btnH, 15); ctx.fill();
    ctx.strokeStyle = '#8B4513'; ctx.lineWidth = 3; ctx.stroke();
    ctx.fillStyle = '#FFF'; ctx.font = 'bold 30px Arial';
    ctx.fillText('开始游戏', canvas.width / 2, btnY + btnH / 2);

    ctx.fillStyle = '#666'; ctx.font = '18px Arial';
    ctx.fillText('点击饼干赚金币，购买升级自动产出！', canvas.width / 2, canvas.height * 0.8);
}

// 游戏界面
function drawGame() {
    const grad = ctx.createRadialGradient(canvas.width * 0.35, canvas.height / 2, 0, canvas.width * 0.35, canvas.height / 2, canvas.width * 0.5);
    grad.addColorStop(0, '#FFF8DC'); grad.addColorStop(0.5, '#FAEBD7'); grad.addColorStop(1, '#D2B48C');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);

    const shopW = Math.min(320, canvas.width * 0.3);
    const mainAreaW = canvas.width - shopW;
    const cx = mainAreaW / 2, cy = canvas.height / 2;

    ctx.fillStyle = '#8B4513'; ctx.font = 'bold 42px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('\u{1F36A} ' + Math.floor(cookies).toLocaleString(), cx, cy - 160);

    ctx.fillStyle = '#A0522D'; ctx.font = '20px Arial';
    ctx.fillText('每秒 ' + cps.toFixed(1) + ' 个', cx, cy - 120);

    const cookieR = Math.min(120, mainAreaW * 0.2, canvas.height * 0.18);
    drawCookie(cx, cy + 20, cookieR);

    ctx.fillStyle = '#999'; ctx.font = '16px Arial';
    ctx.fillText('点击饼干！', cx, cy + 20 + cookieR + 40);

    drawFloatingTexts();
    drawShop();
}

// 点击饼干
function clickCookie() {
    const shopW = Math.min(320, canvas.width * 0.3);
    const mainAreaW = canvas.width - shopW;
    const cx = mainAreaW / 2, cy = canvas.height / 2 + 20;
    const cookieR = Math.min(120, mainAreaW * 0.2, canvas.height * 0.18);

    const dx = mouseX - cx, dy = mouseY - cy;
    if (dx * dx + dy * dy <= cookieR * cookieR * 1.1) {
        cookies += 1; totalCookies += 1; cookieScaleTarget = 1.15;
        const txtX = cx + (Math.random() - 0.5) * 60;
        const txtY = cy - cookieR - 10 + (Math.random() - 0.5) * 20;
        addFloatingText(txtX, txtY, '+1', '#FFD700');
    }
}

// 点击处理
function handleClick(x, y) {
    if (gameState === 'menu') {
        const btnW = 280, btnH = 70;
        const btnX = canvas.width / 2 - btnW / 2, btnY = canvas.height * 0.63;
        if (x >= btnX && x <= btnX + btnW && y >= btnY && y <= btnY + btnH) {
            gameState = 'playing'; cookies = 0; totalCookies = 0; cps = 0;
            for (const u of upgrades) { u.count = 0; u.price = u.basePrice; }
            window.postMessage({ type: 'game_event', eventType: 'game_start', data: { gameType: 'Cookie Clicker' } }, '*');
        }
        return;
    }

    clickCookie();

    // 点击商店
    const shopW = Math.min(320, canvas.width * 0.3);
    const panelX = canvas.width - shopW;
    if (x >= panelX) {
        const itemH = 100, startY = 100;
        for (let i = 0; i < upgrades.length; i++) {
            const iy = startY + i * (itemH + 15);
            if (x >= panelX + 10 && x <= panelX + shopW - 10 && y >= iy && y <= iy + itemH) {
                buyUpgrade(i); return;
            }
        }
    }
}

// 更新
function update(dt) {
    if (gameState !== 'playing') return;
    if (cps > 0) {
        const autoCookies = cps * dt / 1000;
        cookies += autoCookies; totalCookies += autoCookies;
    }

    if (cookieScaleTarget > 1) {
        cookieScale += (cookieScaleTarget - cookieScale) * 0.2;
        if (cookieScale >= cookieScaleTarget - 0.01) { cookieScaleTarget = 0.95; }
    } else if (cookieScaleTarget < 1) {
        cookieScale += (cookieScaleTarget - cookieScale) * 0.15;
        if (cookieScale <= 1.01) { cookieScale = 1; cookieScaleTarget = 1; }
    }

    for (let i = floatingTexts.length - 1; i >= 0; i--) {
        const ft = floatingTexts[i];
        ft.y += ft.vy; ft.alpha -= 0.02;
        if (ft.alpha <= 0) floatingTexts.splice(i, 1);
    }
}

// 渲染
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (gameState === 'menu') { drawMenu(); } else { drawGame(); }
}

// 事件
canvas.addEventListener('click', e => handleClick(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e => {
    e.preventDefault(); const t = e.touches[0]; handleClick(t.clientX, t.clientY);
}, { passive: false });
canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

// 游戏循环
function gameLoop(time) {
    const dt = time - lastTime; lastTime = time;
    update(dt); draw();
    requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
