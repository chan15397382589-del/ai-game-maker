<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>水果忍者</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #5b3a1a; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<script>
var canvas = document.getElementById("gc");
var ctx = canvas.getContext("2d");
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener("resize", resize);

var GRAVITY = 0.35, LIVES_MAX = 3, SLICE_LINE_LIFE = 150;
var FRUIT_COLORS = [
    { main: "#ff3333", light: "#ff6666", dark: "#cc0000", leaf: "#228B22" },
    { main: "#ffe135", light: "#fff06b", dark: "#ccb200", leaf: "#228B22" },
    { main: "#44bb44", light: "#77dd77", dark: "#228822", leaf: "#115511" },
    { main: "#ff8833", light: "#ffaa66", dark: "#cc5500", leaf: "#228B22" },
    { main: "#ff66aa", light: "#ff99cc", dark: "#cc3377", leaf: "#228B22" }
];

var STATE_MENU = 0, STATE_PLAYING = 1, STATE_OVER = 2;
var gameState = STATE_MENU, score = 0, lives = LIVES_MAX;
var comboCount = 0, comboTimer = 0, spawnTimer = 0, spawnInterval = 1200, difficulty = 1;
var fruits = [], halves = [], sliceLines = [], particles = [], floatingTexts = [];
var mouseDown = false, mouseX = 0, mouseY = 0, prevMouseX = 0, prevMouseY = 0, slicePath = [];

function createFruit() {
    var isBomb = Math.random() < 0.12 * difficulty;
    var colorIdx = Math.floor(Math.random() * FRUIT_COLORS.length);
    var startX = canvas.width * 0.15 + Math.random() * canvas.width * 0.7;
    var speedX = (canvas.width / 2 - startX) * 0.008 + (Math.random() - 0.5) * 3;
    var speedY = -(12 + Math.random() * 6 + difficulty * 0.5);
    return { x: startX, y: canvas.height + 50, vx: speedX, vy: speedY,
        radius: 28 + Math.random() * 10, colorIdx: colorIdx,
        isBomb: isBomb, rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.15, sliced: false, alpha: 1 };
}

function drawBackground() {
    ctx.fillStyle = "#5b3a1a";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "rgba(80,50,20,0.15)";
    ctx.lineWidth = 2;
    for (var y = 0; y < canvas.height; y += 18) {
        ctx.beginPath(); ctx.moveTo(0, y);
        for (var x = 0; x < canvas.width; x += 40) {
            ctx.quadraticCurveTo(x + 20, y + Math.sin(x * 0.01 + y * 0.005) * 4, x + 40, y);
        }
        ctx.stroke();
    }
    ctx.fillStyle = "rgba(100,65,25,0.1)";
    for (var y = 0; y < canvas.height; y += 80) { ctx.fillRect(0, y, canvas.width, 30); }
}

function drawFruit(f) {
    ctx.save(); ctx.globalAlpha = f.alpha;
    ctx.translate(f.x, f.y); ctx.rotate(f.rotation);
    var r = f.radius, colors = FRUIT_COLORS[f.colorIdx];
    if (f.isBomb) {
        var g = ctx.createRadialGradient(-r*0.2,-r*0.2,r*0.1,0,0,r);
        g.addColorStop(0,"#555"); g.addColorStop(0.7,"#222"); g.addColorStop(1,"#111");
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle="#aa8833"; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(0,-r); ctx.quadraticCurveTo(r*0.5,-r*1.3,r*0.2,-r*1.6); ctx.stroke();
        ctx.fillStyle="#ff4400"; ctx.beginPath(); ctx.arc(r*0.2,-r*1.6,4,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#ffaa00"; ctx.beginPath(); ctx.arc(r*0.2,-r*1.6,2.5,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="rgba(255,255,255,0.15)"; ctx.beginPath(); ctx.arc(-r*0.25,-r*0.25,r*0.3,0,Math.PI*2); ctx.fill();
    } else {
        var g = ctx.createRadialGradient(-r*0.3,-r*0.3,r*0.1,0,0,r);
        g.addColorStop(0,colors.light); g.addColorStop(0.6,colors.main); g.addColorStop(1,colors.dark);
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle=colors.dark; ctx.lineWidth=1.5; ctx.stroke();
        ctx.fillStyle="rgba(255,255,255,0.4)"; ctx.beginPath(); ctx.arc(-r*0.2,-r*0.25,r*0.22,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=colors.leaf; ctx.beginPath(); ctx.ellipse(r*0.1,-r*0.9,r*0.25,r*0.12,-0.3,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle="#6b4226"; ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(0,-r*0.7); ctx.lineTo(r*0.1,-r*1.05); ctx.stroke();
    }
    ctx.restore();
}

function drawHalves() {
    for (var hi=0;hi<halves.length;hi++) {
        var h=halves[hi]; ctx.save(); ctx.globalAlpha=h.alpha;
        ctx.translate(h.x,h.y); ctx.rotate(h.rotation);
        var colors=FRUIT_COLORS[h.colorIdx], r=h.radius;
        ctx.beginPath();
        if(h.side===0){ctx.arc(0,0,r,-Math.PI/2,Math.PI/2);}else{ctx.arc(0,0,r,Math.PI/2,-Math.PI/2);}
        ctx.closePath();
        var g=ctx.createRadialGradient(0,0,r*0.1,0,0,r);
        g.addColorStop(0,colors.light);g.addColorStop(0.5,colors.main);g.addColorStop(1,colors.dark);
        ctx.fillStyle=g; ctx.fill(); ctx.fillStyle="#ffccaa"; ctx.fillRect(-2,-r,4,r*2);
        ctx.restore();
    }
}

function drawSliceLines() {
    for(var si=0;si<sliceLines.length;si++){
        var line=sliceLines[si]; if(line.points.length<2)continue;
        var alpha=Math.max(0,1-line.age/SLICE_LINE_LIFE);
        ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle="#fff";ctx.lineWidth=3;
        ctx.lineCap="round";ctx.lineJoin="round";ctx.shadowColor="#fff";ctx.shadowBlur=8;
        ctx.beginPath();ctx.moveTo(line.points[0].x,line.points[0].y);
        for(var pi=1;pi<line.points.length;pi++){ctx.lineTo(line.points[pi].x,line.points[pi].y);}
        ctx.stroke();ctx.restore();
    }
}

function drawParticles() {
    for(var i=0;i<particles.length;i++){
        var p=particles[i];ctx.save();ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;
        ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();ctx.restore();
    }
}

function drawFloatingTexts() {
    for(var i=0;i<floatingTexts.length;i++){
        var ft=floatingTexts[i];ctx.save();ctx.globalAlpha=Math.min(1,ft.alpha);
        ctx.fillStyle=ft.color;ctx.font="bold "+ft.size+"px Arial, sans-serif";
        ctx.textAlign="center";ctx.textBaseline="middle";
        ctx.fillText(ft.text,ft.x,ft.y);ctx.restore();
    }
}

function drawHUD() {
    ctx.fillStyle="#fff";ctx.font="bold 32px Arial, sans-serif";
    ctx.textAlign="left";ctx.textBaseline="top";
    ctx.shadowColor="rgba(0,0,0,0.5)";ctx.shadowBlur=4;
    ctx.fillText("得分: "+score,20,20);ctx.shadowBlur=0;
    for(var i=0;i<LIVES_MAX;i++){
        var hx=20+i*35,hy=65;ctx.fillStyle=i<lives?"#ff3333":"#555";
        ctx.beginPath();ctx.moveTo(hx,hy+5);ctx.bezierCurveTo(hx,hy,hx-10,hy-5,hx-10,hy+2);
        ctx.bezierCurveTo(hx-10,hy+10,hx,hy+15,hx,hy+20);
        ctx.bezierCurveTo(hx,hy+15,hx+10,hy+10,hx+10,hy+2);
        ctx.bezierCurveTo(hx+10,hy-5,hx,hy,hx,hy+5);ctx.fill();
    }
    if(comboCount>1&&comboTimer>0){ctx.fillStyle="#FFD700";ctx.font="bold 24px Arial, sans-serif";ctx.textAlign="center";ctx.fillText(comboCount+"连击!",canvas.width/2,40);}
}

function drawMenu() {
    drawBackground();
    ctx.fillStyle="#fff";ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.font="bold 56px Arial, sans-serif";
    ctx.shadowColor="rgba(0,0,0,0.5)";ctx.shadowBlur=10;
    ctx.fillText("水果忍者",canvas.width/2,canvas.height*0.22);ctx.shadowBlur=0;
    for(var i=0;i<3;i++){
        var cx=canvas.width/2-80+i*80,cy=canvas.height*0.37+(i%2)*20,r=25,colors=FRUIT_COLORS[(i*2)%5];
        ctx.save();ctx.translate(cx,cy);
        var g=ctx.createRadialGradient(-r*0.3,-r*0.3,r*0.1,0,0,r);
        g.addColorStop(0,colors.light);g.addColorStop(0.6,colors.main);g.addColorStop(1,colors.dark);
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
        ctx.fillStyle="rgba(255,255,255,0.4)";ctx.beginPath();ctx.arc(-r*0.2,-r*0.25,r*0.22,0,Math.PI*2);ctx.fill();
        ctx.restore();
    }
    ctx.fillStyle="#ddd";ctx.font="20px Arial, sans-serif";
    ctx.fillText("滑动切割水果，避开炸弹！",canvas.width/2,canvas.height*0.50);
    ctx.fillText("切到水果 +10，同时切多个额外加分",canvas.width/2,canvas.height*0.55);
    ctx.fillText("飞出未切或切到炸弹扣命，3 命用完结束",canvas.width/2,canvas.height*0.60);
    var btnW=240,btnH=60,btnX=canvas.width/2-btnW/2,btnY=canvas.height*0.70;
    var g=ctx.createLinearGradient(btnX,btnY,btnX,btnY+btnH);
    g.addColorStop(0,"#ff6633");g.addColorStop(1,"#ee3311");
    ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(btnX,btnY,btnW,btnH,14);ctx.fill();
    ctx.fillStyle="#fff";ctx.font="bold 26px Arial, sans-serif";
    ctx.fillText("开始游戏",canvas.width/2,btnY+btnH/2);
}

function drawGameOver() {
    ctx.fillStyle="rgba(0,0,0,0.7)";ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#ff4444";ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.font="bold 52px Arial, sans-serif";
    ctx.shadowColor="#ff4444";ctx.shadowBlur=15;
    ctx.fillText("游戏结束",canvas.width/2,canvas.height*0.28);ctx.shadowBlur=0;
    ctx.fillStyle="#fff";ctx.font="bold 36px Arial, sans-serif";
    ctx.fillText("得分: "+score,canvas.width/2,canvas.height*0.42);
    var btnW=240,btnH=60,btnX=canvas.width/2-btnW/2,btnY=canvas.height*0.56;
    var g=ctx.createLinearGradient(btnX,btnY,btnX,btnY+btnH);
    g.addColorStop(0,"#44bb44");g.addColorStop(1,"#228822");
    ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(btnX,btnY,btnW,btnH,14);ctx.fill();
    ctx.fillStyle="#fff";ctx.font="bold 26px Arial, sans-serif";
    ctx.fillText("再来一局",canvas.width/2,btnY+btnH/2);
}

function update(dt) {
    if(gameState!==STATE_PLAYING)return;
    difficulty+=dt*0.00005;spawnInterval=Math.max(600,1200-difficulty*50);
    spawnTimer+=dt;
    if(spawnTimer>=spawnInterval){
        spawnTimer=0;var count=1+Math.floor(Math.random()*Math.min(3,1+difficulty*0.3));
        for(var si=0;si<count;si++){fruits.push(createFruit());}
    }
    if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0)comboCount=0;}

    for(var i=fruits.length-1;i>=0;i--){
        var f=fruits[i];f.x+=f.vx;f.vy+=GRAVITY;f.y+=f.vy;f.rotation+=f.rotSpeed;
        if(f.y>canvas.height+80&&!f.sliced){
            if(!f.isBomb){
                lives--;
                floatingTexts.push({x:f.x,y:canvas.height-60,text:"漏掉!",color:"#ff4444",alpha:1.5,vy:-2,size:22});
                if(lives<=0){gameState=STATE_OVER;window.postMessage({type:"game_event",eventType:"game_end",data:{score:score}},"*");return;}
            }
            fruits.splice(i,1);continue;
        }
        if(f.x<-100||f.x>canvas.width+100){fruits.splice(i,1);}
    }

    for(var i=halves.length-1;i>=0;i--){
        var h=halves[i];h.x+=h.vx;h.vy+=GRAVITY*0.8;h.y+=h.vy;
        h.rotation+=h.rotSpeed;h.alpha-=0.008;
        if(h.alpha<=0||h.y>canvas.height+100){halves.splice(i,1);}
    }
    for(var i=sliceLines.length-1;i>=0;i--){sliceLines[i].age+=dt;if(sliceLines[i].age>=SLICE_LINE_LIFE){sliceLines.splice(i,1);}}
    for(var i=particles.length-1;i>=0;i--){
        var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.alpha-=0.02;p.size*=0.98;
        if(p.alpha<=0){particles.splice(i,1);}
    }
    for(var i=floatingTexts.length-1;i>=0;i--){var ft=floatingTexts[i];ft.y+=ft.vy;ft.alpha-=0.02;if(ft.alpha<=0){floatingTexts.splice(i,1);}}
    for(var i=slicePath.length-1;i>=0;i--){slicePath[i].age+=dt;if(slicePath[i].age>100){slicePath.splice(i,1);}}
}

function pointToSegmentDist(px,py,ax,ay,bx,by){
    var dx=bx-ax,dy=by-ay,lenSq=dx*dx+dy*dy;
    if(lenSq===0)return Math.sqrt((px-ax)*(px-ax)+(py-ay)*(py-ay));
    var t=((px-ax)*dx+(py-ay)*dy)/lenSq;t=Math.max(0,Math.min(1,t));
    var cx=ax+t*dx,cy=ay+t*dy;
    return Math.sqrt((px-cx)*(px-cx)+(py-cy)*(py-cy));
}

function checkSlice(){
    if(slicePath.length<2)return;
    var tip=slicePath[slicePath.length-1],prev=slicePath[slicePath.length-2];
    var dx=tip.x-prev.x,dy=tip.y-prev.y;
    if(Math.sqrt(dx*dx+dy*dy)<5)return;
    var slicedThisStroke=0;
    for(var i=fruits.length-1;i>=0;i--){
        var f=fruits[i];if(f.sliced)continue;
        if(pointToSegmentDist(f.x,f.y,prev.x,prev.y,tip.x,tip.y)<f.radius+8){
            f.sliced=true;
            if(f.isBomb){
                lives--;
                for(var p=0;p<20;p++){particles.push({x:f.x,y:f.y,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,size:3+Math.random()*4,color:"#ff4400",alpha:1.5});}
                floatingTexts.push({x:f.x,y:f.y-30,text:"炸弹! -1命",color:"#ff3333",alpha:1.8,vy:-2,size:28});
                fruits.splice(i,1);
                if(lives<=0){gameState=STATE_OVER;window.postMessage({type:"game_event",eventType:"game_end",data:{score:score}},"*");return;}
            } else {
                slicedThisStroke++;comboCount++;comboTimer=800;
                var bonus=slicedThisStroke>1?slicedThisStroke*5:0;
                var comboBonus=comboCount>1?comboCount*3:0;
                var pts=10+bonus+comboBonus;score+=pts;
                halves.push({x:f.x-f.radius*0.2,y:f.y,vx:-3-Math.random()*2,vy:-3-Math.random()*3,radius:f.radius,colorIdx:f.colorIdx,rotation:f.rotation,rotSpeed:-0.1-Math.random()*0.1,side:0,alpha:1});
                halves.push({x:f.x+f.radius*0.2,y:f.y,vx:3+Math.random()*2,vy:-3-Math.random()*3,radius:f.radius,colorIdx:f.colorIdx,rotation:f.rotation,rotSpeed:0.1+Math.random()*0.1,side:1,alpha:1});
                var fruitColor=FRUIT_COLORS[f.colorIdx].main;
                for(var p=0;p<8;p++){particles.push({x:f.x,y:f.y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6-2,size:2+Math.random()*3,color:fruitColor,alpha:1.2});}
                floatingTexts.push({x:f.x,y:f.y-20,text:"+"+pts,color:comboCount>1?"#FFD700":"#fff",alpha:1.5,vy:-2.5,size:comboCount>2?30:22});
                fruits.splice(i,1);
            }
        }
    }
    if(slicePath.length>=2){
        var linePoints=[];
        for(var li=Math.max(0,slicePath.length-10);li<slicePath.length;li++){linePoints.push({x:slicePath[li].x,y:slicePath[li].y});}
        sliceLines.push({points:linePoints,age:0});
    }
}

function startGame(){
    gameState=STATE_PLAYING;score=0;lives=LIVES_MAX;
    comboCount=0;comboTimer=0;spawnTimer=0;difficulty=1;
    fruits=[];halves=[];sliceLines=[];particles=[];floatingTexts=[];slicePath=[];
    window.postMessage({type:"game_event",eventType:"game_start",data:{gameType:"水果忍者"}},"*");
}

function onPointerDown(x,y){
    if(gameState===STATE_MENU){
        var btnW=240,btnH=60,btnX=canvas.width/2-btnW/2,btnY=canvas.height*0.70;
        if(x>=btnX&&x<=btnX+btnW&&y>=btnY&&y<=btnY+btnH){startGame();}
        return;
    }
    if(gameState===STATE_OVER){
        var btnW=240,btnH=60,btnX=canvas.width/2-btnW/2,btnY=canvas.height*0.56;
        if(x>=btnX&&x<=btnX+btnW&&y>=btnY&&y<=btnY+btnH){startGame();}
        return;
    }
    mouseDown=true;mouseX=prevMouseX=x;mouseY=prevMouseY=y;
    slicePath=[{x:x,y:y,age:0}];
}
function onPointerMove(x,y){
    if(!mouseDown||gameState!==STATE_PLAYING)return;
    prevMouseX=mouseX;prevMouseY=mouseY;mouseX=x;mouseY=y;
    slicePath.push({x:x,y:y,age:0});checkSlice();
}
function onPointerUp(){mouseDown=false;slicePath=[];}

canvas.addEventListener("mousedown",function(e){onPointerDown(e.clientX,e.clientY);});
canvas.addEventListener("mousemove",function(e){onPointerMove(e.clientX,e.clientY);});
canvas.addEventListener("mouseup",onPointerUp);
canvas.addEventListener("mouseleave",onPointerUp);
canvas.addEventListener("touchstart",function(e){e.preventDefault();onPointerDown(e.touches[0].clientX,e.touches[0].clientY);});
canvas.addEventListener("touchmove",function(e){e.preventDefault();onPointerMove(e.touches[0].clientX,e.touches[0].clientY);});
canvas.addEventListener("touchend",function(e){e.preventDefault();onPointerUp();});

var lastTime=0;
function gameLoop(timestamp){
    var dt=lastTime?Math.min(timestamp-lastTime,50):16;lastTime=timestamp;
    resize();update(dt);ctx.clearRect(0,0,canvas.width,canvas.height);
    if(gameState===STATE_MENU){drawMenu();}
    else{drawBackground();for(var fi=0;fi<fruits.length;fi++)drawFruit(fruits[fi]);
    drawHalves();drawParticles();drawSliceLines();drawFloatingTexts();drawHUD();
    if(gameState===STATE_OVER)drawGameOver();}
    requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
