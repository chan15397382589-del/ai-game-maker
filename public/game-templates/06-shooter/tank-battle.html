<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// 坦克大战 - 方向键移动 空格射击 3关
var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var W,H;

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  calcLayout();
  draw();
}
window.addEventListener('resize',resize);

// 状态
var state='start'; // start / game / end
var score=0,level=1,enemiesKilled=0;
var enemiesPerLevel=10,totalLevels=3;
var gameWon=false;

// 地图
var mapCols=26,mapRows=26;
var cellSz,mapX,mapY,mapW,mapH;
var map=[]; // 0=空 1=砖墙 2=钢墙 3=基地

// 坦克
var player=null;
var enemies=[];
var playerBullets=[];
var enemyBullets=[];
var base=null;

// 敌方生成
var spawnTimer=0,spawnInterval=180,maxOnScreen=4;

// 按键
var keys={};

function calcLayout(){
  var maxSz=Math.min(W-40,H-100);
  cellSz=Math.floor(maxSz/mapCols);
  mapW=cellSz*mapCols;mapH=cellSz*mapRows;
  mapX=Math.floor((W-mapW)/2);
  mapY=Math.floor((H-mapH)/2)+20;
}

// ===== 地图 =====
function generateMap(){
  map=[];
  for(var r=0;r<mapRows;r++){map[r]=[];for(var c=0;c<mapCols;c++)map[r][c]=0;}
  // 基地
  var bx=Math.floor(mapCols/2)-1,by=mapRows-2;
  map[by][bx]=3;map[by][bx+1]=3;map[by+1][bx]=3;map[by+1][bx+1]=3;
  base={x:bx,y:by,w:2,h:2};
  // 基地保护墙
  for(var dx=-1;dx<=2;dx++){
    var cx2=bx+dx;
    if(by>0&&cx2>=0&&cx2<mapCols&&map[by-1][cx2]===0)map[by-1][cx2]=1;
  }
  if(bx>0){map[by][bx-1]=1;map[by+1][bx-1]=1;}
  if(bx+2<mapCols){map[by][bx+2]=1;map[by+1][bx+2]=1;}
  // 随机墙
  var wc=40+level*5;
  for(var i=0;i<wc;i++){
    var x=Math.floor(Math.random()*mapCols);
    var y=Math.floor(Math.random()*(mapRows-4))+2;
    if(base&&Math.abs(x-base.x-0.5)<3&&Math.abs(y-base.y-0.5)<3)continue;
    if(Math.abs(x-Math.floor(mapCols/2))<2&&y>mapRows-4)continue;
    if(map[y][x]===0)map[y][x]=Math.random()<0.8?1:2;
  }
}

function initGame(){
  score=0;level=1;enemiesKilled=0;gameWon=false;
  playerBullets=[];enemyBullets=[];enemies=[];spawnTimer=0;
  calcLayout();generateMap();spawnPlayer();
}

function spawnPlayer(){
  var px=Math.floor(mapCols/2)-1,py=mapRows-1;
  player={x:mapX+px*cellSz,y:mapY+py*cellSz,w:cellSz*1.8,h:cellSz*1.8,dir:'up',speed:3,alive:true,cd:0};
}

function spawnEnemy(){
  var alive=0;
  for(var i=0;i<enemies.length;i++)if(enemies[i].alive)alive++;
  if(alive>=maxOnScreen)return;
  var pts=[
    {x:mapX+cellSz,y:mapY},
    {x:mapX+Math.floor(mapCols/2)*cellSz,y:mapY},
    {x:mapX+(mapCols-2)*cellSz,y:mapY}
  ];
  var sp=pts[Math.floor(Math.random()*pts.length)];
  for(var i=0;i<enemies.length;i++){
    if(enemies[i].alive&&Math.abs(enemies[i].x-sp.x)<cellSz*2&&Math.abs(enemies[i].y-sp.y)<cellSz*2)return;
  }
  enemies.push({x:sp.x,y:sp.y,w:cellSz*1.8,h:cellSz*1.8,dir:'down',speed:1.5+level*0.3,alive:true,cd:0,moveT:0,dirT:0});
}

function rectsOverlap(a,b){
  return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;
}

function getMapRects(x,y,w,h){
  var rects=[];
  var sc=Math.floor((x-mapX)/cellSz),ec=Math.floor((x+w-mapX)/cellSz);
  var sr=Math.floor((y-mapY)/cellSz),er=Math.floor((y+h-mapY)/cellSz);
  for(var r=Math.max(0,sr);r<=Math.min(mapRows-1,er);r++){
    for(var c=Math.max(0,sc);c<=Math.min(mapCols-1,ec);c++){
      if(map[r][c]!==0)rects.push({x:mapX+c*cellSz,y:mapY+r*cellSz,w:cellSz,h:cellSz,type:map[r][c],row:r,col:c});
    }
  }
  return rects;
}

function canMove(tank,nx,ny){
  if(nx<mapX||ny<mapY||nx+tank.w>mapX+mapW||ny+tank.h>mapY+mapH)return false;
  var mrs=getMapRects(nx,ny,tank.w,tank.h);
  for(var i=0;i<mrs.length;i++){
    if(mrs[i].type>=1&&mrs[i].type<=3){
      if(rectsOverlap({x:nx,y:ny,w:tank.w,h:tank.h},mrs[i]))return false;
    }
  }
  var all=[player];
  for(var i=0;i<enemies.length;i++)all.push(enemies[i]);
  for(var i=0;i<all.length;i++){
    var o=all[i];
    if(!o||o===tank||!o.alive)continue;
    if(rectsOverlap({x:nx,y:ny,w:tank.w,h:tank.h},{x:o.x,y:o.y,w:o.w,h:o.h}))return false;
  }
  return true;
}

function moveTank(tank,dir){
  tank.dir=dir;
  var dx=0,dy=0;
  if(dir==='up')dy=-tank.speed;
  else if(dir==='down')dy=tank.speed;
  else if(dir==='left')dx=-tank.speed;
  else if(dir==='right')dx=tank.speed;
  if(canMove(tank,tank.x+dx,tank.y+dy)){tank.x+=dx;tank.y+=dy;}
}

function shoot(tank,team){
  if(tank.cd>0)return;
  var cx=tank.x+tank.w/2,cy=tank.y+tank.h/2;
  var bs=cellSz*0.3,bx,by;
  if(tank.dir==='up'){bx=cx-bs/2;by=tank.y-bs;}
  else if(tank.dir==='down'){bx=cx-bs/2;by=tank.y+tank.h;}
  else if(tank.dir==='left'){bx=tank.x-bs;by=cy-bs/2;}
  else{bx=tank.x+tank.w;by=cy-bs/2;}
  var b={x:bx,y:by,w:bs,h:bs,dir:tank.dir,speed:6,team:team};
  if(team==='player'){playerBullets.push(b);tank.cd=20;}
  else{enemyBullets.push(b);tank.cd=60;}
}

function updateBullets(bullets){
  for(var i=bullets.length-1;i>=0;i--){
    var b=bullets[i];
    if(b.dir==='up')b.y-=b.speed;
    else if(b.dir==='down')b.y+=b.speed;
    else if(b.dir==='left')b.x-=b.speed;
    else b.x+=b.speed;
    // 出界
    if(b.x<mapX||b.y<mapY||b.x>mapX+mapW||b.y>mapY+mapH){bullets.splice(i,1);continue;}
    // 碰地图
    var mrs=getMapRects(b.x,b.y,b.w,b.h);
    var hit=false;
    for(var j=0;j<mrs.length;j++){
      if(mrs[j].type===1){map[mrs[j].row][mrs[j].col]=0;hit=true;}
      else if(mrs[j].type===2){hit=true;}
      else if(mrs[j].type===3){
        hit=true;
        if(b.team==='enemy'){gameWon=false;state='end';
          try{parent.postMessage({type:"game_event",eventType:"game_end",data:{score:score}},"*");}catch(e){}}
      }
    }
    if(hit){bullets.splice(i,1);continue;}
    // 碰坦克
    if(b.team==='player'){
      for(var j=enemies.length-1;j>=0;j--){
        var e=enemies[j];
        if(!e.alive)continue;
        if(rectsOverlap(b,{x:e.x,y:e.y,w:e.w,h:e.h})){
          e.alive=false;bullets.splice(i,1);score+=100;enemiesKilled++;checkLevel();break;
        }
      }
    }else{
      if(player&&player.alive&&rectsOverlap(b,{x:player.x,y:player.y,w:player.w,h:player.h})){
        bullets.splice(i,1);player.alive=false;gameWon=false;state='end';
        try{parent.postMessage({type:"game_event",eventType:"game_end",data:{score:score}},"*");}catch(e){}
      }
    }
  }
}

function checkLevel(){
  if(enemiesKilled>=enemiesPerLevel){
    if(level>=totalLevels){
      gameWon=true;state='end';
      try{parent.postMessage({type:"game_event",eventType:"game_end",data:{score:score}},"*");}catch(e){}
    }else{
      level++;enemiesKilled=0;enemies=[];playerBullets=[];enemyBullets=[];
      generateMap();spawnPlayer();
    }
  }
}

function updateEnemyAI(e){
  if(!e.alive)return;
  e.cd=Math.max(0,e.cd-1);
  e.moveT++;e.dirT++;
  if(e.dirT>60+Math.random()*60){
    e.dirT=0;
    var dirs=['up','down','left','right'];
    if(player&&player.alive&&Math.random()<0.6){
      var dx=player.x-e.x,dy=player.y-e.y;
      e.dir=Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up');
    }else{
      e.dir=dirs[Math.floor(Math.random()*4)];
    }
  }
  if(e.moveT%2===0)moveTank(e,e.dir);
  if(Math.random()<0.02)shoot(e,'enemy');
}

function update(){
  if(state!=='game')return;
  if(player)player.cd=Math.max(0,player.cd-1);
  if(player&&player.alive){
    if(keys['ArrowUp']||keys['w'])moveTank(player,'up');
    else if(keys['ArrowDown']||keys['s'])moveTank(player,'down');
    else if(keys['ArrowLeft']||keys['a'])moveTank(player,'left');
    else if(keys['ArrowRight']||keys['d'])moveTank(player,'right');
  }
  for(var i=0;i<enemies.length;i++)updateEnemyAI(enemies[i]);
  updateBullets(playerBullets);
  updateBullets(enemyBullets);
  spawnTimer++;
  if(spawnTimer>=spawnInterval){spawnTimer=0;spawnEnemy();}
}

// ===== 绘制 =====
function rrect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function shade(c,a){
  var r=parseInt(c.slice(1,3),16)+a;
  var g=parseInt(c.slice(3,5),16)+a;
  var b=parseInt(c.slice(5,7),16)+a;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return 'rgb('+r+','+g+','+b+')';
}

function drawTank(t,color){
  var cx=t.x+t.w/2,cy=t.y+t.h/2;
  ctx.fillStyle=color;
  ctx.fillRect(t.x+t.w*0.15,t.y+t.h*0.2,t.w*0.7,t.h*0.6);
  ctx.fillStyle=shade(color,-30);
  ctx.fillRect(t.x,t.y+t.h*0.15,t.w*0.2,t.h*0.7);
  ctx.fillRect(t.x+t.w*0.8,t.y+t.h*0.15,t.w*0.2,t.h*0.7);
  ctx.fillStyle=shade(color,20);
  ctx.beginPath();ctx.arc(cx,cy,t.w*0.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=color;
  var bw=t.w*0.12,bl=t.w*0.35;
  if(t.dir==='up')ctx.fillRect(cx-bw/2,t.y-bl*0.3,bw,bl);
  else if(t.dir==='down')ctx.fillRect(cx-bw/2,t.y+t.h-bl*0.7,bw,bl);
  else if(t.dir==='left')ctx.fillRect(t.x-bl*0.3,cy-bw/2,bl,bw);
  else ctx.fillRect(t.x+t.w-bl*0.7,cy-bw/2,bl,bw);
}

var startBtn={},endBtn={};

function drawStart(){
  ctx.fillStyle='#1a1a1a';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#4caf50';
  ctx.font='bold '+Math.min(W*0.07,50)+'px "Microsoft YaHei",Arial';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('坦克大战',W/2,H*0.25);
  ctx.fillStyle='#aaa';
  ctx.font=Math.min(W*0.03,18)+'px "Microsoft YaHei",Arial';
  ctx.fillText('方向键/WASD 移动，空格发射子弹',W/2,H*0.36);
  ctx.fillText('保护基地，消灭10辆敌方坦克过关',W/2,H*0.41);
  ctx.fillText('共3关',W/2,H*0.46);
  var bw=200,bh=50,bx=W/2-bw/2,by=H*0.56;
  ctx.fillStyle='#4caf50';rrect(bx,by,bw,bh,12);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 22px "Microsoft YaHei",Arial';
  ctx.fillText('开始游戏',W/2,by+bh/2);
  startBtn={x:bx,y:by,w:bw,h:bh};
}

function drawGame(){
  ctx.fillStyle='#1a1a1a';ctx.fillRect(0,0,W,H);
  // 地图
  for(var r=0;r<mapRows;r++)for(var c=0;c<mapCols;c++){
    var px=mapX+c*cellSz,py=mapY+r*cellSz;
    if(map[r][c]===1){
      ctx.fillStyle='#8d6e4a';ctx.fillRect(px,py,cellSz,cellSz);
      ctx.strokeStyle='#6d4e2a';ctx.lineWidth=1;ctx.strokeRect(px,py,cellSz,cellSz);
      ctx.strokeStyle='#7d5e3a';ctx.beginPath();
      ctx.moveTo(px+cellSz/2,py);ctx.lineTo(px+cellSz/2,py+cellSz);
      ctx.moveTo(px,py+cellSz/2);ctx.lineTo(px+cellSz,py+cellSz/2);ctx.stroke();
    }else if(map[r][c]===2){
      ctx.fillStyle='#9e9e9e';ctx.fillRect(px,py,cellSz,cellSz);
      ctx.strokeStyle='#bdbdbd';ctx.lineWidth=2;ctx.strokeRect(px+2,py+2,cellSz-4,cellSz-4);
    }else if(map[r][c]===3){
      ctx.fillStyle='#ff9800';ctx.fillRect(px,py,cellSz,cellSz);
      ctx.fillStyle='#fff';ctx.font='bold '+cellSz*0.6+'px Arial';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('★',px+cellSz/2,py+cellSz/2);
    }else{
      ctx.fillStyle='#222';ctx.fillRect(px,py,cellSz,cellSz);
    }
  }
  if(player&&player.alive)drawTank(player,'#4caf50');
  for(var i=0;i<enemies.length;i++)if(enemies[i].alive)drawTank(enemies[i],'#f44336');
  ctx.fillStyle='#fff';
  for(var i=0;i<playerBullets.length;i++)ctx.fillRect(playerBullets[i].x,playerBullets[i].y,playerBullets[i].w,playerBullets[i].h);
  ctx.fillStyle='#ff5722';
  for(var i=0;i<enemyBullets.length;i++)ctx.fillRect(enemyBullets[i].x,enemyBullets[i].y,enemyBullets[i].w,enemyBullets[i].h);
  // HUD
  ctx.fillStyle='#fff';ctx.font='bold 16px "Microsoft YaHei",Arial';
  ctx.textAlign='left';ctx.fillText('分数: '+score,10,20);
  ctx.textAlign='center';ctx.fillText('关卡: '+level+'/'+totalLevels,W/2,20);
  ctx.textAlign='right';ctx.fillText('击杀: '+enemiesKilled+'/'+enemiesPerLevel,W-10,20);
}

function drawEnd(){
  ctx.fillStyle='#1a1a1a';ctx.fillRect(0,0,W,H);
  ctx.fillStyle=gameWon?'#4caf50':'#f44336';
  ctx.font='bold '+Math.min(W*0.07,48)+'px "Microsoft YaHei",Arial';
  ctx.textAlign='center';
  ctx.fillText(gameWon?'恭喜通关！':'游戏结束',W/2,H*0.28);
  ctx.fillStyle='#feca57';ctx.font='bold 28px "Microsoft YaHei",Arial';
  ctx.fillText('最终分数: '+score,W/2,H*0.4);
  ctx.fillStyle='#aaa';ctx.font='20px "Microsoft YaHei",Arial';
  ctx.fillText('到达关卡: '+level,W/2,H*0.48);
  var bw=200,bh=50,bx=W/2-bw/2,by=H*0.58;
  ctx.fillStyle='#4caf50';rrect(bx,by,bw,bh,12);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 22px "Microsoft YaHei",Arial';
  ctx.fillText('再来一局',W/2,by+bh/2);
  endBtn={x:bx,y:by,w:bw,h:bh};
}

function draw(){
  if(state==='start')drawStart();
  else if(state==='game')drawGame();
  else if(state==='end')drawEnd();
}

// 输入
document.addEventListener('keydown',function(e){keys[e.key]=true;
  if(state==='game'&&e.key===' '){e.preventDefault();if(player&&player.alive)shoot(player,'player');}
});
document.addEventListener('keyup',function(e){keys[e.key]=false;});

function handleClick(mx,my){
  if(state==='start'){
    var b=startBtn;
    if(b&&mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h){
      state='game';initGame();
      try{parent.postMessage({type:"game_event",eventType:"game_start",data:{gameType:"坦克大战"}},"*");}catch(e){}
    }
  }else if(state==='end'){
    var b=endBtn;
    if(b&&mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h){
      state='game';initGame();
      try{parent.postMessage({type:"game_event",eventType:"game_start",data:{gameType:"坦克大战"}},"*");}catch(e){}
    }
  }
}
canvas.addEventListener('click',function(e){handleClick(e.clientX,e.clientY);});
canvas.addEventListener('touchstart',function(e){e.preventDefault();var t=e.touches[0];handleClick(t.clientX,t.clientY);});

function loop(){update();draw();requestAnimationFrame(loop);}
resize();requestAnimationFrame(loop);
</script>
</body>
</html>
